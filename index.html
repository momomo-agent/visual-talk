<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="referrer" content="no-referrer">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Talk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Shantell+Sans:wght@300;400&display=swap" rel="stylesheet">
    <!-- Chinese handwriting fonts for sketch labels (split webfonts via jsDelivr) -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <style>
      /* 悠哉字體 Yozai — round handwriting, simplified+traditional+JP+EN */
      @import url('https://cdn.jsdelivr.net/npm/@chinese-fonts/yozai@3.0.0/dist/Yozai-Regular/result.css');
      /* 霞鹜文楷 LXGW WenKai — brush-style, simplified+traditional+JP+EN */
      @import url('https://cdn.jsdelivr.net/npm/@chinese-fonts/lxgwwenkai@3.0.0/dist/LXGWWenKai-Regular/result.css');
      /* 辰宇落雁體 ChenYuluoyan — traditional Chinese only */
      @font-face {
        font-family: 'ChenYuluoyan';
        src: url('https://cdn.jsdelivr.net/npm/@fontpkg/chenyuluoyan@1.0.0/ChenYuluoyan-Thin.ttf') format('truetype');
        font-weight: normal;
        font-style: normal;
        font-display: swap;
      }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  </head>
  <body>
    <div id="app"></div>
    <!-- agentic dogfooding: libraries from jsDelivr CDN (auto-sync on git push) -->
    <script src="https://cdn.jsdelivr.net/gh/momomo-agent/agentic-core@main/docs/agentic-core.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/momomo-agent/agentic-memory@main/docs/memory.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/momomo-agent/agentic-claw@main/claw.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/momomo-agent/agentic-store@main/store.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
